name = "assemble-all-website"
main = ".open-next/worker.js"
compatibility_date = "2026-03-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "assemble-all-website"

[[r2_buckets]]
binding = "QUOTE_PHOTOS"
bucket_name = "assemble-quote-photos"

# Staging Worker + R2 (use: `wrangler deploy -e staging` or npm run deploy:worker:staging)
[env.staging]
name = "assemble-all-website-staging"

[[env.staging.services]]
binding = "WORKER_SELF_REFERENCE"
service = "assemble-all-website-staging"

[[env.staging.r2_buckets]]
binding = "QUOTE_PHOTOS"
bucket_name = "assemble-quote-photos-staging"

[observability]
enabled = true
head_sampling_rate = 1
